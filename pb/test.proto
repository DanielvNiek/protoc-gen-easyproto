syntax = "proto3";
package pb;
option go_package = "easyproto/pb";

// A test message.
message Test {
  // The test name.
  string name = 1;
  // The test age.
  // Between 0 and 100, inclusive.
  int32 age = 2;
  // NICKNAMES
  repeated string nicknames = 3;

  // The test status.
  TestEnum status = 4;
  // The test statuses.
  repeated TestEnum statuses = 5;

  map<string, string> tags = 6;
  map<int32, TestEnum> enum_map = 7;
}

// A test enum.
enum TestEnum {
  // TEST_ENUM_UNSPECIFIED is the default value.
  TEST_ENUM_UNSPECIFIED = 0;
  // TEST_ENUM_VALUE_1 is the first value.
  TEST_ENUM_VALUE_1 = 1;
  // TEST_ENUM_VALUE_2 is the second value.
  TEST_ENUM_VALUE_2 = 2;
}
